<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>مصاريفي</title>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="مصاريفي"/>
<meta name="theme-color" content="#0F1117"/>

<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
-webkit-tap-highlight-color:transparent;
}

html,body{
height:100%;
background:#0F1117;
overflow:hidden;
}

body{
font-family:'Cairo',sans-serif;
color:#f0f0f0;
direction:rtl;
}

input,button,textarea{
font-family:'Cairo',sans-serif;
font-size:16px;
}

::-webkit-scrollbar{width:0}

#app{
max-width:430px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
background:#0F1117;
}

#main{
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding-bottom:20px;
}

#toast{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%) translateY(-80px);
padding:10px 22px;
border-radius:50px;
font-weight:700;
font-size:13px;
z-index:9999;
white-space:nowrap;
pointer-events:none;
transition:.3s;
opacity:0;
}

#toast.on{
transform:translateX(-50%) translateY(0);
opacity:1;
}

#toast.s{background:#06D6A0;color:#000}
#toast.e{background:#FF6B6B;color:#fff}
#toast.w{background:#FFD166;color:#000}

.card{
background:#1E2030;
border-radius:16px;
padding:14px;
margin-bottom:10px;
}

.btn-main{
width:100%;
background:linear-gradient(135deg,#B8B5FF,#8B5CF6);
border:none;
border-radius:13px;
padding:13px;
font-size:14px;
font-weight:800;
color:#fff;
cursor:pointer;
}

.inp{
width:100%;
background:#1E2030;
border:1px solid #333;
border-radius:12px;
padding:12px;
color:#fff;
outline:none;
margin-bottom:10px;
}

</style>
</head>

<body>

<div id="app">
<div id="main"></div>
</div>

<div id="toast"></div>

<script>
var STORE_KEY="masarifi_v2";

function loadData(){
try{
var x=localStorage.getItem(STORE_KEY);
if(x)return JSON.parse(x);
}catch(e){}
return {
currency:"MAD",
months:{}
};
}

var APP=loadData();

function saveData(){
try{
localStorage.setItem(STORE_KEY,JSON.stringify(APP));
return true;
}catch(e){
showToast("تعذر الحفظ","e");
return false;
}
}

function showToast(msg,type){
var t=document.getElementById("toast");
t.textContent=msg;
t.className="on "+(type||"s");
clearTimeout(window.tt);
window.tt=setTimeout(function(){
t.className="";
},2200);
}

function today(){
return new Date().toISOString().slice(0,10);
}

function todayMonth(){
return today().slice(0,7);
}

function mkShort(mk){
var p=mk.split("-");
return new Date(
parseInt(p[0]),
parseInt(p[1])-1,
1
).toLocaleDateString("ar-MA",{
month:"short",
year:"2-digit"
});
}

function getM(key){
if(!APP.months[key]){
APP.months[key]={
incomes:[
{label:"الراتب",amount:10000}
],
charges:[
{label:"كراء",amount:2500},
{label:"ماء وكهرباء",amount:600}
],
savings:0
};
}
return APP.months[key];
}

function total(arr){
return arr.reduce(function(a,b){
return a+b.amount;
},0);
}

function render(){

var m=document.getElementById("main");
var cur=todayMonth();
var data=getM(cur);

var inc=total(data.incomes);
var ch=total(data.charges);
var bal=inc-ch-data.savings;

m.innerHTML=`

<div style="padding:20px">

<div class="card">
<div style="font-size:12px;color:#888">الشهر الحالي</div>
<div style="font-size:24px;font-weight:900">${mkShort(cur)}</div>
</div>

<div class="card">
<div>💰 الدخل</div>
<div style="font-size:22px;color:#06D6A0;font-weight:900">
${inc.toLocaleString()} ${APP.currency}
</div>
</div>

<div class="card">
<div>📤 المصاريف</div>
<div style="font-size:22px;color:#FF6B6B;font-weight:900">
${ch.toLocaleString()} ${APP.currency}
</div>
</div>

<div class="card">
<div>🏦 الادخار</div>
<input id="sav" class="inp" type="number" value="${data.savings}">
<button class="btn-main" onclick="saveSavings()">حفظ الادخار</button>
</div>

<div class="card">
<div>📊 المتبقي</div>
<div style="
font-size:24px;
font-weight:900;
color:${bal>=0?'#06D6A0':'#FF6B6B'};
">
${bal.toLocaleString()} ${APP.currency}
</div>
</div>

<div class="card">
<button class="btn-main" onclick="exportData()">📤 تصدير نسخة احتياطية</button>
<br><br>
<button class="btn-main" onclick="importData()">📥 استيراد نسخة</button>
</div>

</div>
`;
}

function saveSavings(){
var cur=todayMonth();
var d=getM(cur);
var v=parseFloat(document.getElementById("sav").value)||0;
d.savings=v;
saveData();
render();
showToast("تم الحفظ ✓");
}

function exportData(){

var data=JSON.stringify(APP,null,2);
var blob=new Blob([data],{type:"application/json"});
var url=URL.createObjectURL(blob);

var a=document.createElement("a");
a.href=url;
a.download="masarifi_backup.json";

document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(url);

showToast("تم التصدير ✓");
}

function importData(){

var txt=prompt("الصق ملف JSON هنا");

if(!txt)return;

try{

var imp=JSON.parse(txt);

APP={
currency:imp.currency || "MAD",
months:imp.months || {}
};

saveData();
render();

showToast("تم الاستيراد ✓");

}catch(e){
showToast("ملف غير صالح","e");
}

}

window.addEventListener("error",function(){
showToast("حدث خطأ بالتطبيق","e");
});

window.onload=function(){
render();
};
</script>

</body>
</html>
