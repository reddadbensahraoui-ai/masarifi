.irow.paid{background:#0d1f0d;opacity:.75}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.nk{border-radius:13px;padding:16px 0;font-size:21px;font-weight:700;cursor:pointer;border:1.5px solid #2A2D3E;background:#1E2030;color:#fff;font-family:Cairo,sans-serif}

.modal{background:#151720;border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto}

.inp:focus{border-color:#8B5CF6}
.lbl{font-size:11px;color:#666;margin-bottom:6px;display:block}

// Pre-generate 10 years of month keys (120 months)
function gen10Years(){
var keys=[], d=new Date(2024,0,1);
for(var i=0;i<144;i++){
keys.push(d.getFullYear()+”-”+(d.getMonth()<9?“0”:””)+(d.getMonth()+1));
d.setMonth(d.getMonth()+1);
}
return keys;
}
var ALL_MONTHS = gen10Years();

function today(){ return new Date().toISOString().slice(0,10); }
function todayMonth(){ return today().slice(0,7); }

function mkLabel(mk){
var p=mk.split(”-”);
return new Date(p[0],p[1]-1,1).toLocaleDateString(“ar-MA”,{month:“long”,year:“numeric”});
}
function mkShort(mk){
return new Date(mk+”-01”).toLocaleDateString(“ar-MA”,{month:“short”,year:“2-digit”});
}

function getM(key){
if(!APP.months[key]) APP.months[key]=initMonth();
return APP.months[key];
}

var _tt;

var el=document.getElementById(“toast”);
el.textContent=msg; el.className=“on “+(type||“s”);
clearTimeout(_tt); _tt=setTimeout(function(){el.className=””;},2400);

function buildItemRow(item, cur, showPaid){

function buildNumpad(){
var h=’<div class="numpad">’;
[“1”,“2”,“3”,“4”,“5”,“6”,“7”,“8”,“9”,”.”,“0”,“⌫”].forEach(function(k){
h+=’<button class=“nk’+(k===“⌫”?” del”:””)+’” data-nk=”’+k+’”>’+k+’</button>’;
});
h+=’</div>’;
return h;
}
