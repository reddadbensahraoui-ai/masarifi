<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>مصاريفي</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مصاريفي">
<meta name="theme-color" content="#0F1117">

<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0F1117;overflow:hidden}
body{font-family:'Cairo',sans-serif;color:#f0f0f0;direction:rtl}
input,button,textarea{font-family:'Cairo',sans-serif}
::-webkit-scrollbar{width:0}

#app{
max-width:430px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
background:#0F1117;
}

#main{
flex:1;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
padding-bottom:20px;
}

#toast{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%) translateY(-80px);
padding:10px 22px;
border-radius:50px;
font-weight:700;
font-size:13px;
z-index:9999;
white-space:nowrap;
pointer-events:none;
transition:.3s;
opacity:0;
}

#toast.on{
transform:translateX(-50%) translateY(0);
opacity:1;
}

#toast.s{background:#06D6A0;color:#000}
#toast.e{background:#FF6B6B;color:#fff}
#toast.w{background:#FFD166;color:#000}

.card{
background:#1E2030;
border-radius:16px;
padding:14px;
margin-bottom:10px;
}

.chip{
background:#1E2030;
border:1.5px solid transparent;
border-radius:99px;
padding:5px 13px;
font-size:11px;
color:#666;
cursor:pointer;
white-space:nowrap;
}

.tab{
flex:1;
background:none;
border:none;
border-bottom:2px solid transparent;
padding:9px 0;
font-size:12px;
color:#555;
cursor:pointer;
}

.tab.on{
color:#B8B5FF;
border-bottom-color:#B8B5FF;
font-weight:700;
}

.btn-main{
width:100%;
background:linear-gradient(135deg,#B8B5FF,#8B5CF6);
border:none;
border-radius:13px;
padding:13px;
font-size:14px;
font-weight:800;
color:#fff;
cursor:pointer;
}

.inp{
width:100%;
background:#1E2030;
border:1.5px solid #2A2D3E;
border-radius:11px;
padding:11px 13px;
font-size:16px;
color:#fff;
outline:none;
margin-bottom:10px;
}
</style>
</head>

<body>

<div id="app">
<div id="main"></div>
</div>

<div id="toast"></div>

<script>
var STORE_KEY="masarifi_v1_clean";

var APP=loadData();
var curM=todayMonth();
var curTab="charges";

function loadData(){
try{
var r=localStorage.getItem(STORE_KEY);
if(r)return JSON.parse(r);
}catch(e){}
return{
currency:"MAD",
months:{}
};
}

function saveData(){
try{
localStorage.setItem(STORE_KEY,JSON.stringify(APP));
}catch(e){
showToast("تعذر الحفظ","e");
}
}

function today(){
return new Date().toISOString().slice(0,10);
}

function todayMonth(){
return today().slice(0,7);
}

function mkShort(mk){
var p=mk.split("-");
return new Date(
parseInt(p[0]),
parseInt(p[1])-1,
1
).toLocaleDateString("ar-MA",{
month:"short",
year:"2-digit"
});
}

function mkLabel(mk){
var p=mk.split("-");
return new Date(
parseInt(p[0]),
parseInt(p[1])-1,
1
).toLocaleDateString("ar-MA",{
month:"long",
year:"numeric"
});
}

function initMonth(){
return{
incomes:[
{label:"الراتب",amount:21128},
{label:"تعويض الأطفال",amount:900}
],
charges:[
{label:"HOME Crd",amount:2632},
{label:"CAR",amount:2570},
{label:"Charge Du Mois",amount:3500}
],
savings:0
};
}

function getM(key){
if(!APP.months[key]){
APP.months[key]=initMonth();
}
return APP.months[key];
}

function sum(arr){
return arr.reduce(function(s,i){
return s+(parseFloat(i.amount)||0);
},0);
}

function showToast(msg,type){
var el=document.getElementById("toast");
el.textContent=msg;
el.className="on "+(type||"s");
clearTimeout(window.tt);
window.tt=setTimeout(function(){
el.className="";
},2200);
}

function render(){

var m=document.getElementById("main");
var md=getM(curM);

var totalInc=sum(md.incomes);
var totalC=sum(md.charges);
var surplus=totalInc-totalC-md.savings;

m.innerHTML=`

<div style="padding:20px">

<div style="display:flex;gap:8px;margin-bottom:10px">
<button class="chip" onclick="changeMonth(-1)">◀</button>
<div class="chip" style="flex:1;text-align:center;color:#B8B5FF">
${mkLabel(curM)}
</div>
<button class="chip" onclick="changeMonth(1)">▶</button>
</div>

<div class="card">
<div style="display:flex">
<button class="tab ${curTab==='charges'?'on':''}" onclick="setTab('charges')">📤 المصاريف</button>
<button class="tab ${curTab==='income'?'on':''}" onclick="setTab('income')">💰 الدخل</button>
<button class="tab ${curTab==='settings'?'on':''}" onclick="setTab('settings')">⚙️</button>
</div>
</div>

<div class="card">
<div style="font-size:11px;color:#777">الفائض / العجز</div>
<div style="font-size:24px;font-weight:900;color:${surplus>=0?'#06D6A0':'#FF6B6B'}">
${surplus.toLocaleString()} ${APP.currency}
</div>
</div>

${buildSection(md,totalInc,totalC)}

</div>
`;
}

function buildSection(md,totalInc,totalC){

if(curTab==="charges"){
return `
<div class="card">
<div style="margin-bottom:8px">إجمالي المصاريف</div>
<div style="font-size:22px;font-weight:900;color:#FF6B6B">
${totalC.toLocaleString()} ${APP.currency}
</div>
</div>
`;
}

if(curTab==="income"){
return `
<div class="card">
<div style="margin-bottom:8px">إجمالي الدخل</div>
<div style="font-size:22px;font-weight:900;color:#06D6A0">
${totalInc.toLocaleString()} ${APP.currency}
</div>
</div>
`;
}

return `
<div class="card">
<div style="margin-bottom:10px">العملة</div>

<select class="inp" onchange="setCurrency(this.value)">
<option ${APP.currency==='MAD'?'selected':''}>MAD</option>
<option ${APP.currency==='USD'?'selected':''}>USD</option>
<option ${APP.currency==='EUR'?'selected':''}>EUR</option>
<option ${APP.currency==='SAR'?'selected':''}>SAR</option>
</select>

<div style="margin-top:10px">الادخار الشهري</div>
<input id="sav" class="inp" type="number" value="${md.savings}">

<button class="btn-main" onclick="saveSavings()">حفظ الادخار</button>

<br><br>

<button class="btn-main" onclick="exportData()">📤 تصدير نسخة</button>

<br><br>

<button class="btn-main" onclick="importData()">📥 استيراد نسخة</button>

<br><br>

<button class="btn-main" onclick="clearAll()">🗑 مسح البيانات</button>

</div>
`;
}

function setTab(t){
curTab=t;
render();
}

function changeMonth(step){

var p=curM.split("-");
var y=parseInt(p[0]);
var m=parseInt(p[1])-1;

var d=new Date(y,m+step,1);

var yy=d.getFullYear();
var mm=(d.getMonth()+1).toString().padStart(2,"0");

curM=yy+"-"+mm;

render();
}

function setCurrency(v){
APP.currency=v;
saveData();
render();
}

function saveSavings(){
var md=getM(curM);
var val=parseFloat(document.getElementById("sav").value)||0;
md.savings=val;
saveData();
render();
showToast("تم الحفظ ✓");
}

function exportData(){

var data=JSON.stringify(APP,null,2);
var blob=new Blob([data],{type:"application/json"});
var url=URL.createObjectURL(blob);

var a=document.createElement("a");
a.href=url;
a.download="masarifi_backup.json";

document.body.appendChild(a);
a.click();
a.remove();

URL.revokeObjectURL(url);

showToast("تم التصدير ✓");
}

function importData(){

var txt=prompt("الصق JSON هنا");

if(!txt)return;

try{

var imp=JSON.parse(txt);

APP={
currency:imp.currency||"MAD",
months:imp.months||{}
};

saveData();
render();
showToast("تم الاستيراد ✓");

}catch(e){
showToast("ملف غير صالح","e");
}
}

function clearAll(){

if(!confirm("هل أنت متأكد؟"))return;

APP={
currency:"MAD",
months:{}
};

saveData();
render();

showToast("تم المسح","e");
}

window.addEventListener("error",function(){
showToast("حدث خطأ","e");
});

window.onload=function(){
render();
};
</script>

</body>
</html>
