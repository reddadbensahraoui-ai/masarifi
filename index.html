<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>مصاريفي</title>
  <meta name="theme-color" content="#0F1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="مصاريفي" />
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:#0F1117}
    body{font-family:'Cairo',sans-serif;color:#F0F0F0;direction:rtl}
    input,button,select{font-family:'Cairo',sans-serif}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    ::-webkit-scrollbar{width:0}
    #app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:#0F1117}
    .view{flex:1;overflow-y:auto;padding-bottom:90px;-webkit-overflow-scrolling:touch}
    .slide-up{animation:slideUp 0.32s cubic-bezier(0.34,1.4,0.64,1) both}
    @keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0F1117;border-top:1px solid #1E2030;display:flex;align-items:center;justify-content:space-around;padding:10px 0 env(safe-area-inset-bottom,12px);z-index:100}
    .nav-btn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;transition:transform 0.15s}
    .nav-btn:active{transform:scale(0.88)}
    .nav-btn .nav-icon{font-size:20px;opacity:0.35;transition:opacity 0.2s}
    .nav-btn .nav-label{font-size:9px;color:#555;font-weight:400;transition:color 0.2s}
    .nav-btn.active .nav-icon{opacity:1}
    .nav-btn.active .nav-label{color:#B8B5FF;font-weight:700}
    .add-fab{background:linear-gradient(135deg,#B8B5FF,#8B5CF6);border:none;border-radius:20px;width:52px;height:52px;font-size:26px;color:#fff;cursor:pointer;box-shadow:0 4px 22px #8B5CF655;display:flex;align-items:center;justify-content:center;margin-top:-18px;flex:none;transition:transform 0.15s}
    .add-fab:active{transform:scale(0.9)}
    #toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 24px;border-radius:50px;font-weight:700;font-size:14px;z-index:999;white-space:nowrap;pointer-events:none;transition:transform 0.3s cubic-bezier(0.34,1.4,0.64,1),opacity 0.3s;opacity:0}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    #toast.success{background:#06D6A0;color:#0F1117}
    #toast.error{background:#FF6B6B;color:#fff}
    #toast.warn{background:#FFD166;color:#0F1117}
    .card{background:#1E2030;border-radius:18px;padding:18px;margin-bottom:12px}
    .card-sm{background:#1E2030;border-radius:14px;padding:12px 14px;margin-bottom:8px}
    .sec-label{font-size:12px;color:#555;margin-bottom:8px;margin-top:4px}
    .exp-row{display:flex;align-items:center;justify-content:space-between;background:#1E2030;border-radius:14px;padding:12px 14px;margin-bottom:8px}
    .exp-row-left{display:flex;align-items:center;gap:10px}
    .exp-icon{font-size:22px}
    .exp-name{font-size:13px;color:#ccc}
    .exp-sub{font-size:11px;color:#555;margin-top:1px}
    .exp-amount{font-weight:800;font-size:14px}
    .field-label{font-size:12px;color:#666;margin-bottom:7px}
    .inp{width:100%;background:#1E2030;border:1.5px solid transparent;border-radius:14px;padding:13px 15px;font-size:14px;color:#fff;outline:none;transition:border-color 0.2s}
    .inp:focus{border-color:#8B5CF6}
    .progress-track{background:#2A2D3E;border-radius:99px;height:9px;overflow:hidden}
    .progress-fill{height:100%;border-radius:99px;transition:width 0.6s ease,background 0.3s}
    .filter-row{display:flex;gap:8px;overflow-x:auto;padding:0 24px 8px;-webkit-overflow-scrolling:touch}
    .filter-chip{background:#1E2030;border:1.5px solid transparent;border-radius:99px;padding:7px 14px;white-space:nowrap;font-size:12px;color:#888;cursor:pointer;transition:all 0.15s;font-family:'Cairo',sans-serif}
    .filter-chip.active{border-color:#B8B5FF;color:#B8B5FF;background:#B8B5FF18}
    .btn-primary{width:100%;background:linear-gradient(135deg,#B8B5FF,#8B5CF6);border:none;border-radius:18px;padding:16px;font-size:16px;font-weight:800;color:#fff;cursor:pointer;font-family:'Cairo',sans-serif;transition:transform 0.15s}
    .btn-primary:active{transform:scale(0.97)}
    .back-btn{background:#1E2030;border:none;border-radius:12px;width:40px;height:40px;font-size:18px;cursor:pointer;color:#ccc}
    .page-header{display:flex;align-items:center;gap:12px;padding:52px 24px 16px}
    .page-title{font-size:20px;font-weight:800}
    .del-confirm{display:flex;gap:6px}
    .btn-del-yes{background:#FF6B6B;border:none;border-radius:8px;color:#fff;padding:5px 10px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif}
    .btn-del-no{background:#2A2D3E;border:none;border-radius:8px;color:#ccc;padding:5px 10px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif}
    .fc-card{background:#1E2030;border-radius:18px;padding:16px;margin-bottom:10px;border-right:4px solid transparent}
    .fc-card.ok{border-color:#06D6A0}
    .fc-card.warn{border-color:#FFD166}
    .fc-card.over{border-color:#FF6B6B}
    .fc-card.empty{border-color:#333}
    .alert-badge{background:#FF6B6B;color:#fff;border-radius:99px;padding:2px 8px;font-size:10px;font-weight:700}
    .warn-badge{background:#FFD166;color:#0F1117;border-radius:99px;padding:2px 8px;font-size:10px;font-weight:700}
  </style>
</head>
<body>
<div id="app">
  <div id="view-container" class="view"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="home"><span class="nav-icon">🏠</span><span class="nav-label">الرئيسية</span></button>
    <button class="nav-btn" data-view="forecast"><span class="nav-icon">🎯</span><span class="nav-label">الميزانية</span></button>
    <button class="add-fab" id="fab-add">+</button>
    <button class="nav-btn" data-view="history"><span class="nav-icon">📋</span><span class="nav-label">السجل</span></button>
    <button class="nav-btn" data-view="settings"><span class="nav-icon">⚙️</span><span class="nav-label">إعدادات</span></button>
  </nav>
</div>
<div id="toast"></div>
<script>
const CATS=[
  {id:"home",   label:"المنزل والغذاء",  icon:"🏠", color:"#FF6B6B"},
  {id:"self",   label:"مصاريفي الخاصة", icon:"👤", color:"#B8B5FF"},
  {id:"net",    label:"الإنترنت",        icon:"📶", color:"#4ECDC4"},
  {id:"bills",  label:"الماء والكهرباء", icon:"💡", color:"#FFE66D"},
  {id:"family", label:"مساعدة الوالدين",icon:"❤️", color:"#FF8B94"},
  {id:"loan",   label:"القرعة",          icon:"🏦", color:"#A8E6CF"},
  {id:"health", label:"التطبيب والصحة",  icon:"💊", color:"#06D6A0"},
];
const CURRENCIES=["MAD","DZD","TND","SAR","AED","USD","EUR"];
let expenses=JSON.parse(localStorage.getItem("exp")||"[]");
let currency=localStorage.getItem("cur")||"MAD";
let fcBudgets=JSON.parse(localStorage.getItem("fcb")||"{}");
let curView="home",filterCat="all",deletingId=null,editingFC=false;
let formState={amount:"",note:"",category:"home",date:today()};

function save(){localStorage.setItem(“exp”,JSON.stringify(expenses))}
function saveFc(){localStorage.setItem(“fcb”,JSON.stringify(fcBudgets))}
function today(){return new Date().toISOString().split(“T”)[0]}
function thisMonth(){return today().slice(0,7)}
function monthLabel(m){const[y,mo]=m.split(”-”);return new Date(y,mo-1,1).toLocaleDateString(“ar-MA”,{month:“long”,year:“numeric”})}
function fmtDate(d){return new Date(d).toLocaleDateString(“ar-MA”,{day:“numeric”,month:“short”,year:“numeric”})}
function cat(id){return CATS.find(c=>c.id===id)||CATS[0]}
function spentByCat(catId,month){return expenses.filter(e=>e.category===catId&&e.date&&e.date.slice(0,7)===month).reduce((s,e)=>s+e.amount,0)}
function totalSpent(month){return expenses.filter(e=>e.date&&e.date.slice(0,7)===month).reduce((s,e)=>s+e.amount,0)}
function getBudgets(month){return fcBudgets[month]||{}}
function totalBudget(month){return Object.values(getBudgets(month)).reduce((s,v)=>s+(v||0),0)}

let toastTimer;
function toast(msg,type=“success”){const el=document.getElementById(“toast”);el.textContent=msg;el.className=“show “+type;clearTimeout(toastTimer);toastTimer=setTimeout(()=>{el.className=””},2600)}

function checkAlerts(catId){
const m=thisMonth();const bud=getBudgets(m)[catId];if(!bud)return;
const spent=spentByCat(catId,m);const pct=(spent/bud)*100;const ct=cat(catId);
if(pct>=100)toast(“تجاوزت ميزانية “+ct.label+”!”,“error”);
else if(pct>=80)toast(“اقتربت من حد “+ct.label+” (”+pct.toFixed(0)+”%)”,“warn”);
}

function render(viewName){
if(viewName)curView=viewName;
document.querySelectorAll(”.nav-btn”).forEach(b=>{b.classList.toggle(“active”,b.dataset.view===curView)});
const c=document.getElementById(“view-container”);
c.innerHTML=””;c.className=“view slide-up”;
const map={home:renderHome,forecast:renderForecast,add:renderAdd,history:renderHistory,settings:renderSettings};
(map[curView]||renderHome)(c);bindEvents(c);
}

function renderHome(c){
const m=thisMonth();const mt=totalSpent(m);const tb=totalBudget(m);
const budPct=tb>0?Math.min((mt/tb)*100,100):0;
const budColor=budPct>90?”#FF6B6B”:budPct>70?”#FFD166”:”#06D6A0”;
const budLeft=tb>0?tb-mt:null;
const td=expenses.filter(e=>e.date===today()).reduce((s,e)=>s+e.amount,0);
const monthCount=expenses.filter(e=>e.date&&e.date.slice(0,7)===m).length;
const alerts=CATS.filter(ct=>{const bud=getBudgets(m)[ct.id];return bud&&spentByCat(ct.id,m)>=bud*0.8});

c.innerHTML=’<div style="padding:52px 24px 16px;background:linear-gradient(160deg,#1a1d2e,#0F1117)"><div style="margin-bottom:16px"><div style="font-size:12px;color:#777;margin-bottom:4px">مصاريف اليوم</div><div style="font-size:36px;font-weight:900;color:#fff">’+td.toFixed(2)+’ <span style="font-size:15px;color:#666">’+currency+’</span></div></div>’+(tb>0?’<div class="card" style="margin-bottom:0;padding:14px 16px"><div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px"><span style="color:#888">إجمالي ميزانية الشهر</span><span style="color:'+budColor+';font-weight:700">’+(budLeft!==null?(budLeft>=0?“متبقي “+budLeft.toFixed(0):“تجاوزت بـ “+Math.abs(budLeft).toFixed(0)):”—”)+” “+currency+’</span></div><div class="progress-track"><div class="progress-fill" style="width:'+budPct+'%;background:'+budColor+'"></div></div><div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#444"><span>0</span><span>’+tb+” “+currency+’</span></div></div>’:””)+’</div>’+(alerts.length>0?’<div style="padding:12px 24px 0"><div style="background:#FF6B6B18;border:1.5px solid #FF6B6B44;border-radius:14px;padding:12px 14px"><div style="font-size:12px;color:#FF8B94;font-weight:700;margin-bottom:6px">⚠️ تنبيهات الميزانية</div>’+alerts.map(ct=>{const bud=getBudgets(m)[ct.id];const spent=spentByCat(ct.id,m);const pct=Math.min((spent/bud)*100,100);const over=spent>=bud;return’<div style=“font-size:12px;color:’+(over?”#FF6B6B”:”#FFD166”)+’;margin-bottom:3px”>’+ct.icon+” “+ct.label+”: “+spent.toFixed(0)+”/”+bud+” “+currency+” (”+pct.toFixed(0)+’%)</div>’}).join(””)+’</div></div>’:””)+’<div style="padding:14px 24px 0"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="card" style="margin-bottom:0"><div style="font-size:20px">📅</div><div style="font-size:19px;font-weight:800;color:#B8B5FF;margin:5px 0 2px">’+mt.toFixed(2)+’</div><div style="font-size:11px;color:#555">هذا الشهر (’+currency+’)</div></div><div class="card" style="margin-bottom:0"><div style="font-size:20px">🔢</div><div style="font-size:19px;font-weight:800;color:#4ECDC4;margin:5px 0 2px">’+monthCount+’</div><div style="font-size:11px;color:#555">عدد العمليات</div></div></div></div><div style="padding:14px 24px 0"><div class="sec-label">آخر المصاريف</div>’+( expenses.slice(0,5).length===0?’<div style="text-align:center;padding:36px 0;color:#444;font-size:14px"><div style="font-size:34px;margin-bottom:8px">📭</div>لا توجد مصاريف بعد</div>’:expenses.slice(0,5).map(e=>{const ct=cat(e.category);return’<div class="exp-row" style="border-right:3px solid '+ct.color+'"><div class="exp-row-left"><span class="exp-icon">’+ct.icon+’</span><div><div class="exp-name">’+(e.note||ct.label)+’</div><div class="exp-sub">’+fmtDate(e.date)+’</div></div></div><span class="exp-amount" style="color:'+ct.color+'">’+e.amount.toFixed(2)+’</span></div>’}).join(””))+(expenses.length>5?’<button class="filter-chip active" style="width:100%;text-align:center;border-radius:12px;padding:11px;margin-top:4px" data-action="goto-history">عرض الكل (’+expenses.length+’)</button>’:””)+’</div>’;
}

function renderForecast(c){
const m=thisMonth();const budgets=getBudgets(m);
let html=’<div class="page-header" style="justify-content:space-between"><h2 class="page-title">🎯 ‘+monthLabel(m)+’</h2><button data-action=“toggle-edit” style=“background:’+(editingFC?“linear-gradient(135deg,#B8B5FF,#8B5CF6)”:”#1E2030”)+’;border:none;border-radius:12px;padding:8px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif”>’+(editingFC?“✓ حفظ”:“✏️ تعديل”)+’</button></div><div style="padding:0 24px 0">’;
CATS.forEach(ct=>{
const bud=budgets[ct.id]||0;const spent=spentByCat(ct.id,m);
const pct=bud>0?Math.min((spent/bud)*100,100):0;
const over=bud>0&&spent>=bud;const near=bud>0&&pct>=80&&!over;
const cc=bud===0?“empty”:over?“over”:near?“warn”:“ok”;
const bc=over?”#FF6B6B”:near?”#FFD166”:”#06D6A0”;
const left=bud>0?bud-spent:null;
html+=’<div class="fc-card '+cc+'"><div style=“display:flex;align-items:center;justify-content:space-between;margin-bottom:’+(bud>0||editingFC?“10px”:“0”)+’”>’;
html+=’<div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">’+ct.icon+’</span><div><div style="font-size:13px;font-weight:700;color:#ddd">’+ct.label+’</div>’;
if(over)html+=’<span class="alert-badge">تجاوز!</span>’;
else if(near)html+=’<span class="warn-badge">تقترب</span>’;
html+=’</div></div><div style="text-align:left"><div style=“font-weight:800;font-size:15px;color:’+(over?”#FF6B6B”:near?”#FFD166”:ct.color)+’”>’+spent.toFixed(2)+’</div><div style="font-size:11px;color:#555">من ‘+(bud>0?bud:”—”)+” “+currency+’</div></div></div>’;
if(bud>0&&!editingFC)html+=’<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%;background:'+bc+'"></div></div>’;
if(editingFC)html+=’<div style="display:flex;gap:8px;margin-top:6px"><input class=“inp fc-inp” data-cat=”’+ct.id+’” type=“text” inputmode=“numeric” value=”’+(bud||””)+’” placeholder=“حدد الميزانية…” style=“flex:1;padding:10px 12px;font-size:13px;background:#2A2D3E”/><span style="line-height:40px;font-size:12px;color:#666">’+currency+’</span></div>’;
else if(bud===0)html+=’<div style="font-size:11px;color:#444;margin-top:4px">لم تحدد ميزانية — اضغط تعديل</div>’;
else if(left!==null)html+=’<div style=“font-size:11px;color:’+(over?”#FF6B6B”:left<bud*0.2?”#FFD166”:”#555”)+’;;margin-top:6px;text-align:left”>’+(over?“تجاوز بـ “+Math.abs(left).toFixed(2):“متبقي “+left.toFixed(2))+” “+currency+’</div>’;
html+=’</div>’;
});
html+=’<div class="card" style="margin-top:6px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:#888">إجمالي الميزانية</span><span style="color:#B8B5FF;font-weight:700">’+totalBudget(m).toFixed(2)+” “+currency+’</span></div><div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#888">إجمالي المصروف</span><span style="color:#FF8B94;font-weight:700">’+totalSpent(m).toFixed(2)+” “+currency+’</span></div></div></div>’;
c.innerHTML=html;
}

function renderAdd(c){
const m=thisMonth();
c.innerHTML=’<div style="padding:52px 24px 40px"><div class="page-header" style="padding:0 0 24px"><button class="back-btn" data-action="back">←</button><h2 class="page-title">إضافة مصروف</h2></div><div class="card" style="text-align:center;margin-bottom:16px"><div style="font-size:12px;color:#666;margin-bottom:8px">المبلغ</div><div style="display:flex;align-items:center;justify-content:center;gap:8px"><input id="inp-amount" type="number" inputmode="decimal" placeholder="0.00" value="'+formState.amount+'" style="background:transparent;border:none;outline:none;font-size:44px;font-weight:900;color:#fff;width:160px;text-align:center;font-family:Cairo,sans-serif"/><span style="font-size:18px;color:#666">’+currency+’</span></div></div><div style="margin-bottom:16px"><div class="field-label">الفئة</div><div id="cat-grid" style="display:flex;flex-direction:column;gap:8px">’+CATS.map(ct=>{const bud=getBudgets(m)[ct.id];const spent=spentByCat(ct.id,m);const sel=formState.category===ct.id;const pctStr=bud?spent.toFixed(0)+”/”+bud:””;const pctColor=bud?(spent>=bud?”#FF6B6B”:spent>=bud*0.8?”#FFD166”:”#06D6A0”):””;return’<div class=“cat-row-chip” data-cat=”’+ct.id+’” style=“display:flex;align-items:center;gap:10px;background:’+(sel?ct.color+“22”:”#1E2030”)+’;border:2px solid ‘+(sel?ct.color:“transparent”)+’;border-radius:14px;padding:11px 14px;cursor:pointer”><span style="font-size:20px">’+ct.icon+’</span><span style=“font-size:13px;color:’+(sel?ct.color:”#ccc”)+’;font-weight:’+(sel?“700”:“400”)+’”>’+ct.label+’</span>’+(bud?’<span style="margin-right:auto;font-size:11px;color:'+pctColor+'">’+pctStr+’</span>’:””)+’</div>’}).join(””)+’</div></div><div style="margin-bottom:16px"><div class="field-label">ملاحظة (اختياري)</div><input id="inp-note" class="inp" type="text" placeholder="مثل: فاتورة الكهرباء..." value="'+formState.note+'"/></div><div style="margin-bottom:28px"><div class="field-label">التاريخ</div><input id="inp-date" class="inp" type="date" value="'+formState.date+'" style="color-scheme:dark"/></div><button class="btn-primary" data-action="submit-add">تأكيد الإضافة ✓</button></div>’;
setTimeout(()=>{const a=document.getElementById(“inp-amount”);if(a)a.focus()},200);
}

function renderHistory(c){
const filtered=filterCat===“all”?expenses:expenses.filter(e=>e.category===filterCat);
const grouped={};filtered.forEach(e=>{grouped[e.date]=grouped[e.date]||[];grouped[e.date].push(e)});
const dates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
c.innerHTML=’<div class="page-header"><h2 class="page-title">السجل</h2></div><div class="filter-row">’+[{id:“all”,label:“الكل”,icon:“🔍”},…CATS].map(ct=>’<div class=“filter-chip’+(filterCat===ct.id?” active”:””)+’” data-filter=”’+ct.id+’”>’+ct.icon+” “+ct.label+’</div>’).join(””)+’</div><div style="padding:0 24px">’+(dates.length===0?’<div style="text-align:center;padding:60px 0;color:#444"><div style="font-size:36px;margin-bottom:8px">📭</div>لا توجد نتائج</div>’:dates.map(date=>’<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;font-size:12px;color:#555;margin-bottom:8px"><span>’+fmtDate(date)+’</span><span>’+grouped[date].reduce((s,e)=>s+e.amount,0).toFixed(2)+” “+currency+’</span></div>’+grouped[date].map(e=>{const ct=cat(e.category);return’<div class="exp-row" style="border-right:3px solid '+ct.color+'"><div class="exp-row-left"><span class="exp-icon">’+ct.icon+’</span><div><div class="exp-name">’+(e.note||ct.label)+’</div><div class="exp-sub">’+ct.label+’</div></div></div><div style="display:flex;align-items:center;gap:8px"><span class="exp-amount" style="color:'+ct.color+'">’+e.amount.toFixed(2)+’</span>’+(deletingId===e.id?’<div class="del-confirm"><button class="btn-del-yes" data-action="confirm-del" data-id="'+e.id+'">حذف</button><button class="btn-del-no" data-action="cancel-del">إلغاء</button></div>’:’<button data-action="start-del" data-id="'+e.id+'" style="background:#2A2D3E;border:none;border-radius:8px;width:28px;height:28px;font-size:14px;cursor:pointer;color:#666">🗑</button>’)+’</div></div>’}).join(””)+’</div>’).join(””))+’</div>’;
}

function renderSettings(c){
const allTotal=expenses.reduce((s,e)=>s+e.amount,0);
const days=[…new Set(expenses.map(e=>e.date))].length;
const maxExp=expenses.length?Math.max(…expenses.map(e=>e.amount)):0;
const avgDay=days?(allTotal/days):0;
c.innerHTML=’<div style="padding:52px 24px 0"><h2 class="page-title" style="margin-bottom:20px">الإعدادات</h2><div class="card"><div class="sec-label">العملة</div><div style="display:flex;flex-wrap:wrap;gap:8px">’+CURRENCIES.map(cur=>’<button class=“filter-chip’+(currency===cur?” active”:””)+’” data-action=“set-currency” data-cur=”’+cur+’”>’+cur+’</button>’).join(””)+’</div></div><div class="card"><div class="sec-label" style="margin-bottom:14px">إحصائيات عامة</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">’+[{label:“أعلى مصروف”,value:maxExp>0?maxExp.toFixed(2):”—”,icon:“📈”,color:”#FF6B6B”},{label:“متوسط اليوم”,value:days?avgDay.toFixed(2):”—”,icon:“📊”,color:”#4ECDC4”},{label:“إجمالي المصاريف”,value:allTotal.toFixed(2),icon:“💰”,color:”#FFE66D”},{label:“عدد الأيام”,value:days,icon:“📅”,color:”#A8E6CF”}].map(s=>’<div style="background:#2A2D3E;border-radius:12px;padding:12px"><div style="font-size:18px">’+s.icon+’</div><div style="font-size:16px;font-weight:800;color:'+s.color+';margin:4px 0 2px">’+s.value+’</div><div style="font-size:10px;color:#555">’+s.label+’</div></div>’).join(””)+’</div></div><button data-action="clear-all" style="width:100%;background:#FF6B6B18;border:1.5px solid #FF6B6B44;border-radius:16px;padding:14px;color:#FF6B6B;font-size:14px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">مسح جميع البيانات</button></div>’;
}

function bindEvents(c){
const ia=document.getElementById(“inp-amount”);const ino=document.getElementById(“inp-note”);const ind=document.getElementById(“inp-date”);
if(ia)ia.addEventListener(“input”,e=>{formState.amount=e.target.value});
if(ino)ino.addEventListener(“input”,e=>{formState.note=e.target.value});
if(ind)ind.addEventListener(“change”,e=>{formState.date=e.target.value});
document.querySelectorAll(”.cat-row-chip”).forEach(chip=>{
chip.addEventListener(“click”,()=>{
formState.category=chip.dataset.cat;
document.querySelectorAll(”.cat-row-chip”).forEach(x=>{
const ct=cat(x.dataset.cat);const sel=x.dataset.cat===formState.category;
x.style.background=sel?ct.color+“22”:”#1E2030”;x.style.borderColor=sel?ct.color:“transparent”;
const lbl=x.querySelector(“span:nth-child(2)”);if(lbl){lbl.style.color=sel?ct.color:”#ccc”;lbl.style.fontWeight=sel?“700”:“400”;}
});
});
});
document.querySelectorAll(”.fc-inp”).forEach(inp=>{
inp.addEventListener(“blur”,()=>{
const m=thisMonth();if(!fcBudgets[m])fcBudgets[m]={};
const v=parseFloat(inp.value.replace(/[^0-9.]/g,””));
if(!isNaN(v)&&v>0)fcBudgets[m][inp.dataset.cat]=v;else delete fcBudgets[m][inp.dataset.cat];
saveFc();
});
});
document.querySelectorAll(”[data-filter]”).forEach(chip=>{chip.addEventListener(“click”,()=>{filterCat=chip.dataset.filter;render(“history”)})});
c.addEventListener(“click”,e=>{
const el=e.target.closest(”[data-action]”);if(!el)return;const action=el.dataset.action;
if(action===“back”){formState={amount:””,note:””,category:“home”,date:today()};render(“home”)}
if(action===“goto-history”){render(“history”)}
if(action===“toggle-edit”){
if(editingFC){
const m=thisMonth();if(!fcBudgets[m])fcBudgets[m]={};
document.querySelectorAll(”.fc-inp”).forEach(inp=>{
const v=parseFloat(inp.value.replace(/[^0-9.]/g,””));
if(!isNaN(v)&&v>0)fcBudgets[m][inp.dataset.cat]=v;else delete fcBudgets[m][inp.dataset.cat];
});
saveFc();toast(“تم حفظ الميزانية ✓”);
}
editingFC=!editingFC;render(“forecast”);
}
if(action===“submit-add”){
const amt=parseFloat(formState.amount);if(!amt||amt<=0){toast(“أدخل مبلغاً صحيحاً”,“error”);return}
expenses.unshift({id:Date.now(),amount:amt,note:formState.note.trim(),category:formState.category,date:formState.date});
save();checkAlerts(formState.category);
formState={amount:””,note:””,category:“home”,date:today()};render(“home”);
}
if(action===“start-del”){deletingId=parseInt(el.dataset.id);render(“history”)}
if(action===“cancel-del”){deletingId=null;render(“history”)}
if(action===“confirm-del”){expenses=expenses.filter(e=>e.id!==parseInt(el.dataset.id));save();deletingId=null;toast(“تم الحذف”,“error”);render(“history”)}
if(action===“set-currency”){currency=el.dataset.cur;localStorage.setItem(“cur”,currency);render(“settings”)}
if(action===“clear-all”){if(confirm(“هل أنت متأكد؟”)){expenses=[];fcBudgets={};localStorage.removeItem(“exp”);localStorage.removeItem(“fcb”);toast(“تم مسح البيانات”,“error”);render(“home”)}}
});
}
document.querySelectorAll(”.nav-btn[data-view]”).forEach(btn=>{btn.addEventListener(“click”,()=>{deletingId=null;filterCat=“all”;render(btn.dataset.view)})});
document.getElementById(“fab-add”).addEventListener(“click”,()=>{formState={amount:””,note:””,category:“home”,date:today()};curView=“add”;render()});
render(“home”);
if(“serviceWorker” in navigator){window.addEventListener(“load”,()=>{navigator.serviceWorker.register(“sw.js”).catch(e=>console.warn(e))})}
</script>

</body>
</html>
