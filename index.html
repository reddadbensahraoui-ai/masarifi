<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>مصاريفي</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="مصاريفي"/>
<meta name="theme-color" content="#0F1117"/>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0F1117;overflow:hidden}
body{font-family:'Cairo',sans-serif;color:#f0f0f0;direction:rtl}
input,button{font-family:'Cairo',sans-serif}
::-webkit-scrollbar{width:0}
#app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:#0F1117}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);padding:10px 22px;border-radius:50px;font-weight:700;font-size:13px;z-index:9999;white-space:nowrap;pointer-events:none;transition:all .3s;opacity:0}
#toast.on{transform:translateX(-50%) translateY(0);opacity:1}
#toast.s{background:#06D6A0;color:#000}
#toast.e{background:#FF6B6B;color:#fff}
#toast.w{background:#FFD166;color:#000}
.card{background:#1E2030;border-radius:16px;padding:14px;margin-bottom:10px}
.chip{background:#1E2030;border:1.5px solid transparent;border-radius:99px;padding:5px 13px;font-size:11px;color:#666;cursor:pointer;white-space:nowrap;font-family:Cairo,sans-serif}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:9px 0;font-size:12px;color:#555;cursor:pointer;font-family:Cairo,sans-serif}
.tab.on{color:#B8B5FF;border-bottom-color:#B8B5FF;font-weight:700}
.btn-main{width:100%;background:linear-gradient(135deg,#B8B5FF,#8B5CF6);border:none;border-radius:13px;padding:13px;font-size:14px;font-weight:800;color:#fff;cursor:pointer;font-family:Cairo,sans-serif}
.bar-t{background:#2A2D3E;border-radius:99px;height:8px;overflow:hidden;margin:5px 0}
.bar-f{height:100%;border-radius:99px;transition:width .5s}
.row{display:flex;align-items:center;justify-content:space-between}
.irow{display:flex;align-items:center;justify-content:space-between;background:#1E2030;border-radius:13px;padding:10px 12px;margin-bottom:7px}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.nk{border-radius:13px;padding:16px 0;font-size:21px;font-weight:700;cursor:pointer;border:1.5px solid #2A2D3E;background:#1E2030;color:#fff;font-family:Cairo,sans-serif}
.nk.del{background:#FF6B6B22;border-color:#FF6B6B55;color:#FF6B6B;font-size:20px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#151720;border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto}
.inp{width:100%;background:#1E2030;border:1.5px solid #2A2D3E;border-radius:11px;padding:11px 13px;font-size:14px;color:#fff;outline:none;font-family:Cairo,sans-serif;margin-bottom:10px}
.lbl{font-size:11px;color:#666;margin-bottom:6px;display:block}
</style>
</head>
<body>
<div id="app"><div id="main"></div></div>
<div id="toast"></div>
<script>
// ── DATA ──────────────────────────────────────────────────
var SK = "masarifi_v1";
var APP = (function(){ try{ var r=localStorage.getItem(SK); if(r) return JSON.parse(r); }catch(e){} return {currency:"MAD",months:{}}; })();

function save(){ try{ localStorage.setItem(SK,JSON.stringify(APP)); }catch(e){ toast("تعذر الحفظ!","e"); } }

var DC = [
  {id:"home_crd",label:"HOME Crd",amount:2632,icon:"🏠",color:"#FF6B6B"},
  {id:"car",label:"CAR",amount:2570,icon:"🚗",color:"#4ECDC4"},
  {id:"charge_m",label:"Charge Du Mois",amount:3500,icon:"🛒",color:"#FFE66D"},
  {id:"crd_mois",label:"Crd MOIS",amount:5000,icon:"💳",color:"#B8B5FF"},
  {id:"ecole",label:"ECOLE",amount:950,icon:"🎓",color:"#A8E6CF"},
  {id:"cantine",label:"Cantine",amount:520,icon:"🍽️",color:"#FF8B94"},
  {id:"parent",label:"Parent Give",amount:1000,icon:"❤️",color:"#FF8B94"},
  {id:"rak",label:"RAK",amount:300,icon:"🏦",color:"#06D6A0"},
  {id:"int",label:"INT",amount:250,icon:"📄",color:"#FFDAB9"}
];
var DI = [
  {id:"sal",label:"الراتب",amount:21128,icon:"💼",color:"#06D6A0"},
  {id:"child",label:"تعويض الأطفال",amount:900,icon:"👶",color:"#74B9FF"}
];
var ICONS=["📦","🚗","🛒","💊","🎓","🍽️","❤️","🏦","📄","💡","📶","🎯","💰","🔧","⚽","👕","✈️","🎬","🏠","💳","🌿","⛽","🏥","📱","🎁","💼","👶","🏗️"];
var COLS=["#FF6B6B","#4ECDC4","#FFE66D","#B8B5FF","#A8E6CF","#FF8B94","#06D6A0","#FFDAB9","#FFD166","#74B9FF","#fd79a8","#00cec9"];
var CURRS=["MAD","DZD","TND","SAR","AED","USD","EUR"];

function newMonth(){
  return {
    incomes: DI.map(function(i){ return {id:i.id,label:i.label,amount:i.amount,icon:i.icon,color:i.color}; }),
    charges: DC.map(function(c){ return {id:c.id,label:c.label,amount:c.amount,icon:c.icon,color:c.color,paid:false}; }),
    savings: 0
  };
}

function gen10Y(){
  var k=[],d=new Date(2024,0,1);
  for(var i=0;i<144;i++){
    k.push(d.getFullYear()+"-"+(d.getMonth()<9?"0":"")+(d.getMonth()+1));
    d.setMonth(d.getMonth()+1);
  }
  return k;
}
var ALL = gen10Y();

function td(){ return new Date().toISOString().slice(0,10); }
function tm(){ return td().slice(0,7); }
function mlabel(mk){ var p=mk.split("-"); return new Date(p[0],p[1]-1,1).toLocaleDateString("ar-MA",{month:"long",year:"numeric"}); }
function mshort(mk){ return new Date(mk+"-01").toLocaleDateString("ar-MA",{month:"short",year:"2-digit"}); }
function gm(k){ if(!APP.months[k]) APP.months[k]=newMonth(); return APP.months[k]; }

// ── STATE ─────────────────────────────────────────────────
var curM  = tm();
var curTab= "charges";
var modal = null;
var pendingDelId   = null;
var pendingDelType = null;
var numVal  = "";
var numLabel= "";
var numIcon = "📦";
var numCol  = "#B8B5FF";
var numStep = "info";
var editId  = null;
var editType= null;

// ── TOAST ─────────────────────────────────────────────────
var _tt;
function toast(msg,type){
  var el=document.getElementById("toast");
  el.textContent=msg; el.className="on "+(type||"s");
  clearTimeout(_tt); _tt=setTimeout(function(){ el.className=""; },2400);
}

// ── AUTO BACKUP ───────────────────────────────────────────
function autoBackup(){
  try{
    var last=localStorage.getItem("masarifi_bk");
    var now=new Date();
    var key=now.getFullYear()+"-"+now.getMonth();
    if(last===key||Object.keys(APP.months).length===0) return;
    var blob=new Blob([JSON.stringify(APP,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;
    a.download="masarifi_auto_"+now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate()+".json";
    a.click();
    URL.revokeObjectURL(url);
    localStorage.setItem("masarifi_bk",key);
    toast("تم النسخ الاحتياطي التلقائي ✓");
  }catch(e){}
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  var el=document.getElementById("main");
  var st=el.scrollTop;
  el.innerHTML=page();
  bind();
  el.scrollTop=st;
}

// ── PAGE ──────────────────────────────────────────────────
function page(){
  var md=gm(curM);
  var tInc=md.incomes.reduce(function(s,i){return s+i.amount;},0);
  var tChg=md.charges.reduce(function(s,c){return s+c.amount;},0);
  var paid=md.charges.filter(function(c){return c.paid;}).reduce(function(s,c){return s+c.amount;},0);
  var surp=tInc-tChg;
  var afsv=surp-(md.savings||0);
  var cur=APP.currency;
  var now=tm();
  var ni=ALL.indexOf(now);
  var ci=ALL.indexOf(curM);
  var vs=ALL.slice(Math.max(0,ci-3),Math.min(ALL.length,ci+7));
  var h="";

  // ── HEADER
  h+='<div style="background:linear-gradient(160deg,#1a1d2e,#0F1117);padding:48px 0 0">';
  h+='<div style="display:flex;gap:7px;overflow-x:auto;padding:0 20px 12px">';
  vs.forEach(function(mk){
    var s= mk===now  ? "border-color:#06D6A0;color:#06D6A0;background:#06D6A015" :
           mk===curM ? "border-color:#B8B5FF;color:#B8B5FF;background:#B8B5FF15" : "";
    h+='<div class="chip" style="'+s+'" onclick="setCurM(\''+mk+'\')">'+mshort(mk)+'</div>';
  });
  h+='</div>';

  // summary
  h+='<div style="padding:0 20px 14px">';
  h+='<div style="font-size:11px;color:#555;margin-bottom:8px">'+mlabel(curM)+'</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">';
  h+='<div class="card" style="margin-bottom:0"><div style="font-size:10px;color:#555;margin-bottom:3px">💰 الدخل</div><div style="font-size:20px;font-weight:900;color:#06D6A0">'+tInc.toLocaleString()+'</div><div style="font-size:9px;color:#444">'+cur+'</div></div>';
  h+='<div class="card" style="margin-bottom:0"><div style="font-size:10px;color:#555;margin-bottom:3px">📤 المصاريف</div><div style="font-size:20px;font-weight:900;color:#FF8B94">'+tChg.toLocaleString()+'</div><div style="font-size:9px;color:#444">'+cur+'</div></div>';
  h+='</div>';
  var sc=surp>=0?"#06D6A0":"#FF6B6B";
  h+='<div class="card" style="margin-bottom:8px">';
  h+='<div class="row" style="margin-bottom:6px"><span style="font-size:11px;color:#666">الفائض / العجز</span>';
  h+='<span style="font-size:18px;font-weight:900;color:'+sc+'">'+(surp>=0?"+":"")+surp.toLocaleString()+' '+cur+'</span></div>';
  h+='<div class="bar-t"><div class="bar-f" style="width:'+(tInc>0?Math.min((tChg/tInc)*100,100):0)+'%;background:'+sc+'"></div></div>';
  h+='<div class="row" style="margin-top:3px;font-size:9px;color:#444"><span>مدفوع: '+paid.toLocaleString()+'</span><span>متبقي: '+(tChg-paid).toLocaleString()+'</span></div>';
  h+='</div>';
  var sv=md.savings||0;
  h+='<div class="card" style="border:1.5px solid '+(sv>0?"#74B9FF44":"#2A2D3E")+';background:'+(sv>0?"#0a1f2a":"#1E2030")+'">';
  h+='<div class="row"><div><div style="font-size:11px;color:#74B9FF;margin-bottom:2px">🏦 الادخار</div>';
  h+='<div style="font-size:18px;font-weight:900;color:#74B9FF">'+sv.toLocaleString()+' <span style="font-size:10px;color:#555">'+cur+'</span></div></div>';
  h+='<button onclick="openModal(\'savings\')" style="background:#2A2D3E;border:none;border-radius:9px;padding:6px 11px;color:#888;font-size:12px;cursor:pointer;font-family:Cairo,sans-serif">✏️ تعديل</button></div>';
  if(sv>0){
    var ac=afsv>=0?"#06D6A0":"#FF6B6B";
    h+='<div class="row" style="margin-top:8px;font-size:12px"><span style="color:#666">المتبقي بعد الادخار</span><span style="font-weight:800;color:'+ac+'">'+(afsv>=0?"+":"")+afsv.toLocaleString()+' '+cur+'</span></div>';
  }
  if(surp>0&&!sv) h+='<div style="font-size:10px;color:#555;margin-top:6px">لديك فائض '+surp.toLocaleString()+' '+cur+' — يمكنك ادخار جزء منه 💡</div>';
  h+='</div></div></div>';

  // ── TABS
  h+='<div style="display:flex;border-bottom:1px solid #1E2030;background:#0F1117;position:sticky;top:0;z-index:10">';
  h+='<button class="tab'+(curTab==="charges"?" on":"")+'" onclick="setTab(\'charges\')">📤 المصاريف ('+md.charges.length+')</button>';
  h+='<button class="tab'+(curTab==="income"?" on":"")+'" onclick="setTab(\'income\')">💰 الدخل ('+md.incomes.length+')</button>';
  h+='<button class="tab'+(curTab==="settings"?" on":"")+'" onclick="setTab(\'settings\')">⚙️</button>';
  h+='</div>';

  h+='<div style="padding:12px 20px">';

  // ── CHARGES TAB
  if(curTab==="charges"){
    h+='<button onclick="openModal(\'addCharge\')" style="width:100%;background:#1E2030;border:1.5px dashed #B8B5FF55;border-radius:13px;padding:11px;color:#B8B5FF;font-size:13px;cursor:pointer;font-family:Cairo,sans-serif;margin-bottom:10px">+ إضافة مصروف</button>';
    var sorted=md.charges.slice().sort(function(a,b){return b.amount-a.amount;});
    sorted.forEach(function(c){ h+=itemRow(c,cur,true); });
  }

  // ── INCOME TAB
  if(curTab==="income"){
    h+='<button onclick="openModal(\'addIncome\')" style="width:100%;background:#1E2030;border:1.5px dashed #06D6A055;border-radius:13px;padding:11px;color:#06D6A0;font-size:13px;cursor:pointer;font-family:Cairo,sans-serif;margin-bottom:10px">+ إضافة مصدر دخل</button>';
    md.incomes.forEach(function(i){ h+=itemRow(i,cur,false); });
    h+='<div style="background:#0a1f0a;border-radius:13px;padding:10px 14px;border:1px solid #06D6A022;margin-top:6px">';
    h+='<div class="row"><span style="color:#888;font-size:13px">إجمالي الدخل</span><span style="font-weight:800;color:#06D6A0;font-size:14px">'+tInc.toLocaleString()+' '+cur+'</span></div></div>';
  }

  // ── SETTINGS TAB
  if(curTab==="settings"){
    h+='<div class="card"><div style="font-size:11px;color:#444;margin-bottom:9px">العملة</div><div style="display:flex;flex-wrap:wrap;gap:7px">';
    CURRS.forEach(function(c){ h+='<div class="chip'+(APP.currency===c?" on":"")+'" onclick="setCur(\''+c+'\')">'+c+'</div>'; });
    h+='</div></div>';
    h+='<div class="card"><div style="font-size:11px;color:#444;margin-bottom:10px">ملخص الأشهر</div>';
    Object.keys(APP.months).sort().forEach(function(mk){
      var mm=APP.months[mk];
      var ti=mm.incomes.reduce(function(s,i){return s+i.amount;},0);
      var tc=mm.charges.reduce(function(s,c){return s+c.amount;},0);
      var b=ti-tc;
      h+='<div class="row" style="font-size:12px;margin-bottom:6px;padding:5px 0;border-bottom:1px solid #2A2D3E">';
      h+='<span style="color:#888">'+mshort(mk)+'</span>';
      h+='<span style="font-weight:700;color:'+(b>=0?"#06D6A0":"#FF6B6B")+'">'+(b>=0?"+":"")+b.toLocaleString()+'</span></div>';
    });
    h+='</div>';
    h+='<div class="card"><div style="font-size:11px;color:#444;margin-bottom:10px">💾 النسخ الاحتياطي</div>';
    h+='<div style="font-size:11px;color:#555;margin-bottom:10px;line-height:1.7">بياناتك على هاتفك فقط ✅<br>لا ترسل لأي خادم 🔒<br>نسخة احتياطية تلقائية كل شهر</div>';
    h+='<button onclick="doExport()" style="width:100%;background:#0a1f2a;border:1.5px solid #74B9FF44;border-radius:12px;padding:12px;color:#74B9FF;font-size:13px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;margin-bottom:8px">📤 تصدير نسخة احتياطية</button>';
    h+='<button onclick="openModal(\'import\')" style="width:100%;background:#1a1a0a;border:1.5px solid #FFD16644;border-radius:12px;padding:12px;color:#FFD166;font-size:13px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;margin-bottom:8px">📥 استيراد نسخة احتياطية</button>';
    h+='<button onclick="openModal(\'confirmClear\')" style="width:100%;background:#FF6B6B15;border:1.5px solid #FF6B6B33;border-radius:13px;padding:12px;color:#FF6B6B;font-size:13px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif">🗑️ مسح جميع البيانات</button>';
    h+='</div>';
  }

  h+='</div>';
  h+=buildModal();
  return h;
}

// ── ITEM ROW ──────────────────────────────────────────────
function itemRow(item,cur,showPaid){
  var h='<div class="irow" style="background:'+(showPaid&&item.paid?"#0d1f0d":"#1E2030")+';opacity:'+(showPaid&&item.paid?.75:1)+';border-right:3px solid '+(showPaid&&item.paid?"#06D6A0":item.color)+'">';
  h+='<div style="display:flex;align-items:center;gap:8px;flex:1">';
  if(showPaid){
    h+='<button onclick="togglePaid(\''+item.id+'\')" style="background:'+(item.paid?"#06D6A033":"transparent")+';border:2px solid '+(item.paid?"#06D6A0":"#333")+';border-radius:99px;width:26px;height:26px;cursor:pointer;color:#06D6A0;font-size:13px;flex-shrink:0">'+(item.paid?"✓":"")+'</button>';
  }
  h+='<span style="font-size:18px">'+item.icon+'</span>';
  h+='<div><div style="font-size:13px;color:'+(showPaid&&item.paid?"#555":"#ccc")+';text-decoration:'+(showPaid&&item.paid?"line-through":"none")+'">'+item.label+'</div>';
  if(showPaid&&item.paid) h+='<div style="font-size:10px;color:#06D6A0">✓ مدفوع</div>';
  h+='</div></div>';
  h+='<div style="display:flex;align-items:center;gap:7px">';
  h+='<span style="font-size:14px;font-weight:800;color:'+(showPaid&&item.paid?"#444":item.color)+'">'+item.amount.toLocaleString()+'</span>';
  h+='<button onclick="openEdit(\''+item.id+'\',\''+(showPaid?"charge":"income")+'\')" style="background:#2A2D3E;border:none;border-radius:7px;width:26px;height:26px;font-size:12px;cursor:pointer;color:#777">✏️</button>';
  h+='<button onclick="askDel(\''+item.id+'\',\''+(showPaid?"charge":"income")+'\')" style="background:#2A2D3E;border:none;border-radius:7px;width:26px;height:26px;font-size:13px;cursor:pointer;color:#555">🗑</button>';
  h+='</div></div>';
  return h;
}

// ── NUMPAD ────────────────────────────────────────────────
function numpad(){
  var h='<div class="numpad">';
  ["1","2","3","4","5","6","7","8","9",".","0","⌫"].forEach(function(k){
    h+='<button class="nk'+(k==="⌫"?" del":"")+'" onclick="nkPress(\''+k+'\')">'+k+'</button>';
  });
  h+='</div>';
  return h;
}

// ── MODAL ─────────────────────────────────────────────────
function buildModal(){
  if(!modal) return "";
  var h='<div class="modal-bg" onclick="bgClick(event)"><div class="modal">';
  h+='<div class="row" style="margin-bottom:16px">';

  if(modal==="savings"){
    var md=gm(curM);
    var surp=md.incomes.reduce(function(s,i){return s+i.amount;},0)-md.charges.reduce(function(s,c){return s+c.amount;},0);
    h+='<span style="font-size:16px;font-weight:800">🏦 الادخار الشهري</span>';
    h+='<button onclick="closeModal()" style="background:#1E2030;border:none;border-radius:99px;width:30px;height:30px;color:#888;cursor:pointer;font-size:16px">✕</button></div>';
    h+='<div style="font-size:11px;color:#666;margin-bottom:6px">الفائض: <span style="color:#06D6A0;font-weight:700">'+Math.max(0,surp).toLocaleString()+' '+APP.currency+'</span></div>';
    h+='<div style="font-size:36px;font-weight:900;color:'+(numVal?"#74B9FF":"#333")+';text-align:center;margin-bottom:10px">'+(numVal||"0")+' <span style="font-size:13px;color:#555">'+APP.currency+'</span></div>';
    h+=numpad();
    h+='<button onclick="saveSavings()" class="btn-main">حفظ الادخار</button>';
  }

  else if(modal==="addCharge"||modal==="addIncome"){
    h+='<span style="font-size:16px;font-weight:800">'+(modal==="addCharge"?"إضافة مصروف":"إضافة مصدر دخل")+'</span>';
    h+='<button onclick="closeModal()" style="background:#1E2030;border:none;border-radius:99px;width:30px;height:30px;color:#888;cursor:pointer;font-size:16px">✕</button></div>';
    if(numStep==="info"){
      h+='<label class="lbl">الاسم</label><input id="nlbl" class="inp" type="text" placeholder="مثل: Diesel، Assurance..." value="'+numLabel+'" oninput="numLabel=this.value"/>';
      h+='<label class="lbl">الأيقونة</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
      ICONS.forEach(function(ic){ h+='<button onclick="setIcon(\''+ic+'\')" style="background:'+(numIcon===ic?"#B8B5FF22":"#1E2030")+';border:2px solid '+(numIcon===ic?"#B8B5FF":"transparent")+';border-radius:9px;padding:7px 9px;font-size:19px;cursor:pointer">'+ic+'</button>'; });
      h+='</div><label class="lbl">اللون</label><div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px">';
      COLS.forEach(function(c){ h+='<button onclick="setCol(\''+c+'\')" style="width:30px;height:30px;border-radius:99px;background:'+c+';border:'+(numCol===c?"3px solid #fff":"3px solid transparent")+';cursor:pointer"></button>'; });
      h+='</div><button onclick="nextStep()" class="btn-main">التالي ←</button>';
    } else {
      h+='<div style="text-align:center;margin-bottom:8px"><span style="font-size:22px">'+numIcon+'</span> <span style="color:#888;font-size:13px">'+numLabel+'</span></div>';
      h+='<div style="font-size:38px;font-weight:900;color:'+(numVal?"#fff":"#333")+';text-align:center;margin-bottom:10px">'+(numVal||"0")+' <span style="font-size:13px;color:#555">'+APP.currency+'</span></div>';
      h+=numpad();
      h+='<button onclick="saveItem()" class="btn-main" style="margin-bottom:8px">تأكيد ✓</button>';
      h+='<button onclick="prevStep()" style="width:100%;background:none;border:none;color:#555;font-size:13px;cursor:pointer;font-family:Cairo,sans-serif;padding:8px">← رجوع</button>';
    }
  }

  else if(modal==="editItem"){
    h+='<span style="font-size:16px;font-weight:800">✏️ تعديل</span>';
    h+='<button onclick="closeModal()" style="background:#1E2030;border:none;border-radius:99px;width:30px;height:30px;color:#888;cursor:pointer;font-size:16px">✕</button></div>';
    h+='<label class="lbl">الاسم</label><input id="nlbl" class="inp" type="text" value="'+numLabel+'" oninput="numLabel=this.value"/>';
    h+='<div style="font-size:36px;font-weight:900;color:'+(numVal?"#fff":"#333")+';text-align:center;margin-bottom:10px">'+(numVal||"0")+' <span style="font-size:13px;color:#555">'+APP.currency+'</span></div>';
    h+=numpad();
    h+='<button onclick="saveEdit()" class="btn-main">حفظ التعديل ✓</button>';
  }

  else if(modal==="import"){
    h+='<span style="font-size:16px;font-weight:800">📥 استيراد</span>';
    h+='<button onclick="closeModal()" style="background:#1E2030;border:none;border-radius:99px;width:30px;height:30px;color:#888;cursor:pointer;font-size:16px">✕</button></div>';
    h+='<div style="font-size:12px;color:#888;margin-bottom:12px">الصق محتوى ملف JSON هنا:</div>';
    h+='<textarea id="itxt" style="width:100%;background:#1E2030;border:1.5px solid #2A2D3E;border-radius:11px;padding:12px;font-size:12px;color:#ccc;height:120px;resize:none;font-family:Cairo,sans-serif;outline:none;margin-bottom:12px" placeholder="الصق JSON هنا..."></textarea>';
    h+='<button onclick="doImport()" class="btn-main">استيراد البيانات</button>';
  }

  else if(modal==="confirmClear"){
    h+='<span style="font-size:16px;font-weight:800">⚠️ تأكيد الحذف</span>';
    h+='<button onclick="closeModal()" style="background:#1E2030;border:none;border-radius:99px;width:30px;height:30px;color:#888;cursor:pointer;font-size:16px">✕</button></div>';
    h+='<div style="font-size:14px;color:#ccc;text-align:center;margin:20px 0;line-height:1.8">هل أنت متأكد؟<br><span style="color:#FF6B6B;font-weight:700">سيتم حذف جميع البيانات نهائياً</span></div>';
    h+='<div style="display:flex;gap:10px">';
    h+='<button onclick="doClear()" style="flex:1;background:#FF6B6B;border:none;border-radius:13px;padding:14px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:Cairo,sans-serif">نعم، احذف</button>';
    h+='<button onclick="closeModal()" style="flex:1;background:#1E2030;border:none;border-radius:13px;padding:14px;color:#888;font-size:15px;cursor:pointer;font-family:Cairo,sans-serif">إلغاء</button>';
    h+='</div>';
  }

  else if(modal==="confirmDel"){
    h+='<span style="font-size:16px;font-weight:800">🗑️ حذف العنصر</span>';
    h+='<button onclick="closeModal()" style="background:#1E2030;border:none;border-radius:99px;width:30px;height:30px;color:#888;cursor:pointer;font-size:16px">✕</button></div>';
    h+='<div style="font-size:14px;color:#ccc;text-align:center;margin:20px 0">هل تريد حذف هذا العنصر؟</div>';
    h+='<div style="display:flex;gap:10px">';
    h+='<button onclick="doDelItem()" style="flex:1;background:#FF6B6B;border:none;border-radius:13px;padding:14px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:Cairo,sans-serif">نعم، احذف</button>';
    h+='<button onclick="closeModal()" style="flex:1;background:#1E2030;border:none;border-radius:13px;padding:14px;color:#888;font-size:15px;cursor:pointer;font-family:Cairo,sans-serif">إلغاء</button>';
    h+='</div>';
  }

  h+='</div></div>';
  return h;
}

// ── BIND (only textarea needs event listener) ─────────────
function bind(){
  // nothing needed - all actions use onclick inline
}

// ── ACTIONS ───────────────────────────────────────────────
function setCurM(mk){ curM=mk; render(); }
function setTab(t){ curTab=t; render(); }
function setCur(c){ APP.currency=c; save(); render(); }
function openModal(m){ modal=m; numVal=""; render(); }
function closeModal(){ modal=null; render(); }
function bgClick(e){ if(e.target===e.currentTarget){ modal=null; render(); } }

function togglePaid(id){
  var md=gm(curM);
  md.charges=md.charges.map(function(c){ return c.id===id ? Object.assign({},c,{paid:!c.paid}) : c; });
  APP.months[curM]=md;
  save();
  render();
}

function nkPress(k){
  if(k==="⌫"){ numVal=numVal.slice(0,-1); }
  else if(k==="."&&numVal.includes(".")){ return; }
  else if(numVal.length>=9){ return; }
  else{ numVal+=k; }
  render();
}

function setIcon(ic){ numIcon=ic; render(); }
function setCol(c){ numCol=c; render(); }

function nextStep(){
  if(!numLabel.trim()){ toast("أدخل الاسم أولاً","e"); return; }
  numStep="amount"; numVal=""; render();
}
function prevStep(){ numStep="info"; render(); }

function saveItem(){
  var v=parseFloat(numVal);
  if(!numLabel.trim()){ toast("أدخل الاسم","e"); return; }
  if(isNaN(v)||v<=0){ toast("أدخل مبلغاً صحيحاً","e"); return; }
  var md=gm(curM);
  var ni={id:Date.now()+"",label:numLabel.trim(),amount:v,icon:numIcon,color:numCol,paid:false};
  if(modal==="addCharge") md.charges.push(ni);
  else md.incomes.push(ni);
  APP.months[curM]=md;
  save(); modal=null; numStep="info";
  toast("تمت الإضافة ✓"); render();
}

function saveSavings(){
  var v=parseFloat(numVal)||0;
  var md=gm(curM);
  var sp=md.incomes.reduce(function(s,i){return s+i.amount;},0)-md.charges.reduce(function(s,c){return s+c.amount;},0);
  if(v>sp&&sp>0) toast("يتجاوز الفائض المتاح!","w");
  md.savings=v; APP.months[curM]=md;
  save(); modal=null;
  toast("تم حفظ الادخار ✓"); render();
}

function openEdit(id,type){
  var md=gm(curM);
  var arr=type==="charge"?md.charges:md.incomes;
  var item=arr.find(function(x){return x.id===id;});
  if(!item) return;
  editId=id; editType=type;
  numVal=String(item.amount); numLabel=item.label; numIcon=item.icon; numCol=item.color;
  modal="editItem"; render();
}

function saveEdit(){
  var v=parseFloat(numVal);
  if(isNaN(v)||v<=0){ toast("أدخل مبلغاً صحيحاً","e"); return; }
  var md=gm(curM);
  var arr=editType==="charge"?md.charges:md.incomes;
  arr=arr.map(function(x){ return x.id===editId ? Object.assign({},x,{label:numLabel||x.label,amount:v,icon:numIcon,color:numCol}) : x; });
  if(editType==="charge") md.charges=arr; else md.incomes=arr;
  APP.months[curM]=md; save(); modal=null;
  toast("تم الحفظ ✓"); render();
}

function askDel(id,type){
  pendingDelId=id; pendingDelType=type;
  modal="confirmDel"; render();
}

function doDelItem(){
  var md=gm(curM);
  if(pendingDelType==="charge") md.charges=md.charges.filter(function(x){return x.id!==pendingDelId;});
  else md.incomes=md.incomes.filter(function(x){return x.id!==pendingDelId;});
  APP.months[curM]=md; save(); modal=null;
  toast("تم الحذف","e"); render();
}

function doClear(){
  APP={currency:"MAD",months:{}}; save(); modal=null;
  toast("تم مسح جميع البيانات","e"); render();
}

function doExport(){
  var d=new Date();
  var blob=new Blob([JSON.stringify(APP,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download="masarifi_"+d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()+".json";
  a.click(); URL.revokeObjectURL(url);
  toast("تم التصدير ✓");
}

function doImport(){
  var txt=document.getElementById("itxt");
  if(!txt||!txt.value.trim()){ toast("الصق البيانات أولاً","e"); return; }
  try{
    var imp=JSON.parse(txt.value.trim());
    if(!imp.months){ toast("ملف غير صالح","e"); return; }
    APP=imp; save(); modal=null;
    toast("تم الاستيراد بنجاح ✓"); render();
  }catch(e){ toast("خطأ في الملف","e"); }
}

// ── START ─────────────────────────────────────────────────
render();
setTimeout(function(){ autoBackup(); }, 3000);
</script>
</body>
</html>
