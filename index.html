.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}

.inp:focus{border-color:#8B5CF6}
.lbl{font-size:11px;color:#666;margin-bottom:6px;display:block}

   CUSTOM CONFIRM  (replaces browser confirm)
════════════════════════════════════════ */
var _confirmCb = null;

function showConfirm(title, msg, cb){
_confirmCb = cb;
document.getElementById(“confirm-title”).textContent = title;
document.getElementById(“confirm-msg”).textContent   = msg;
document.getElementById(“confirm-overlay”).classList.add(“open”);
}
function closeConfirm(){
document.getElementById(“confirm-overlay”).classList.remove(“open”);
_confirmCb = null;
}

document.getElementById(“confirm-cancel”).addEventListener(“click”, function(){
closeConfirm();
});
document.getElementById(“confirm-ok”).addEventListener(“click”, function(){
closeConfirm();
if(typeof _confirmCb === “function”) _confirmCb();
});

/* ════════════════════════════════════════
CONSTANTS & DEFAULTS
════════════════════════════════════════ */
var STORE_KEY = “masarifi_v1”;

var DEF_CHARGES = [
{id:“home_crd”, label:“HOME Crd”,       amount:2632, icon:“🏠”, color:”#FF6B6B”},
{id:“car”,      label:“CAR”,            amount:2570, icon:“🚗”, color:”#4ECDC4”},
{id:“charge_m”, label:“Charge Du Mois”, amount:3500, icon:“🛒”, color:”#FFE66D”},
{id:“crd_mois”, label:“Crd MOIS”,       amount:5000, icon:“💳”, color:”#B8B5FF”},
{id:“ecole”,    label:“ECOLE”,          amount:950,  icon:“🎓”, color:”#A8E6CF”},
{id:“cantine”,  label:“Cantine”,        amount:520,  icon:“🍽️”, color:”#FF8B94”},
{id:“parent”,   label:“Parent Give”,    amount:1000, icon:“❤️”, color:”#FF8B94”},
{id:“rak”,      label:“RAK”,            amount:300,  icon:“🏦”, color:”#06D6A0”},

var DEF_INCOMES = [
{id:“sal”,   label:“الراتب”,         amount:21128, icon:“💼”, color:”#06D6A0”},

/* ════════════════════════════════════════
DATA
════════════════════════════════════════ */
function deepClone(o){ return JSON.parse(JSON.stringify(o)); }

function loadData(){
try{ var r=localStorage.getItem(STORE_KEY); if(r) return JSON.parse(r); }catch(e){}
return {currency:“MAD”, months:{}};
}
function saveData(){
try{ localStorage.setItem(STORE_KEY, JSON.stringify(APP)); }
catch(e){ toast(“تعذر الحفظ!”,“e”); }
}

/* ─── FIX: clearAll now correctly resets APP first, then saves ─── */
function clearAll(){
var c = (APP && APP.currency) ? APP.currency : “MAD”;
APP = {currency: c, months: {}};   /* 1. reset the in-memory object */
localStorage.removeItem(STORE_KEY);/* 2. wipe storage               */
saveData();                         /* 3. write fresh empty object   */
}

function initMonth(){
return {
incomes: deepClone(DEF_INCOMES),
charges: deepClone(DEF_CHARGES).map(function(c){ c.paid=false; return c; }),
savings: 0
};
}
function peekM(key){
return APP.months[key] || {incomes:[], charges:[], savings:0};
}
function useM(key){
if(!APP.months[key]) APP.months[key] = initMonth();
return APP.months[key];
}

function gen10Years(){
var out=[], d=new Date(2024,0,1);
for(var i=0;i<144;i++){
out.push(d.getFullYear()+”-”+(d.getMonth()<9?“0”:””)+(d.getMonth()+1));
d.setMonth(d.getMonth()+1);
}
return out;
}
var ALL_MONTHS = gen10Years();

/* ════════════════════════════════════════
HELPERS
════════════════════════════════════════ */
function mkLabel(mk){ var p=mk.split(”-”); return new Date(+p[0],+p[1]-1,1).toLocaleDateString(“ar-MA”,{month:“long”,year:“numeric”}); }
function mkShort(mk){ var p=mk.split(”-”); return new Date(+p[0],+p[1]-1,1).toLocaleDateString(“ar-MA”,{month:“short”,year:“2-digit”}); }
function esc(s){ return (s||””).replace(/&/g,”&”).replace(/”/g,”"”).replace(/</g,”<”).replace(/>/g,”>”); }
function uid(){ return Date.now()+”_”+Math.floor(Math.random()*1e9); }

var _tt;
function toast(msg,type){
var el=document.getElementById(“toast”);
el.textContent=msg; el.className=“on “+(type||“s”);
clearTimeout(_tt); _tt=setTimeout(function(){ el.className=””; },2500);
}

/* ════════════════════════════════════════
AUTO BACKUP (once per month)
════════════════════════════════════════ */
setTimeout(function(){
try{
var now=new Date(), tag=now.getFullYear()+”-”+now.getMonth();
if(localStorage.getItem(“masarifi_backup_tag”)===tag) return;
if(!Object.keys(APP.months).length) return;
var b=new Blob([JSON.stringify(APP,null,2)],{type:“application/json”});
var u=URL.createObjectURL(b), a=document.createElement(“a”);
a.href=u; a.download=“masarifi_auto_”+now.getFullYear()+”-”+(now.getMonth()+1)+”-”+now.getDate()+”.json”;
a.click(); URL.revokeObjectURL(u);
localStorage.setItem(“masarifi_backup_tag”,tag);
toast(“تم النسخ الاحتياطي التلقائي ✓”);
}catch(e){}
},3000);

h += ‘<button class=“toggle-paid-btn” data-id=”’+item.id+’” style=“background:’+(item.paid?”#06D6A033”:“transparent”)+’;border:2px solid ‘+(item.paid?”#06D6A0”:”#333”)+’;border-radius:99px;width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#06D6A0;flex-shrink:0”>’+(item.paid?“✓”:””)+’</button>’;
}
h += ‘<span style="font-size:18px">’+item.icon+’</span>’;
h += ‘<div><div style=“font-size:13px;color:’+(item.paid?”#555”:”#ccc”)+’;text-decoration:’+(item.paid?“line-through”:“none”)+’”>’+esc(item.label)+’</div>’;
if(item.paid) h += ‘<div style="font-size:10px;color:#06D6A0">✓ مدفوع</div>’;
h += ‘</div></div>’;
h += ‘<div style="display:flex;align-items:center;gap:7px">’;
h += ‘<span style=“font-size:14px;font-weight:800;color:’+(item.paid?”#444”:item.color)+’”>’+item.amount.toLocaleString()+’</span>’;
h += ‘<button class=“edit-btn” data-id=”’+item.id+’” data-type=”’+(isCharge?“charge”:“income”)+’” style=“background:#2A2D3E;border:none;border-radius:7px;width:24px;height:24px;font-size:12px;cursor:pointer;color:#777”>✏️</button>’;
h += ‘<button class=“del-btn”  data-id=”’+item.id+’” data-type=”’+(isCharge?“charge”:“income”)+’” style=“background:#2A2D3E;border:none;border-radius:7px;width:24px;height:24px;font-size:13px;cursor:pointer;color:#555”>🗑</button>’;
h += ‘</div></div>’;
return h;
}

/* ════════════════════════════════════════
MODAL HTML
════════════════════════════════════════ */
function redrawModal(){
document.getElementById(“modal-box”).innerHTML = buildModalHTML();
}

function buildModalHTML(){
var cur = APP.currency;
var h = ‘<div class="row" style="margin-bottom:16px">’;

if(modalKind===“savings”){
var md=peekM(curM);
var sp=md.incomes.reduce(function(s,x){return s+x.amount;},0)-md.charges.reduce(function(s,x){return s+x.amount;},0);
h += ‘<span style="font-size:16px;font-weight:800">🏦 الادخار الشهري</span>’;
h += xBtn()+’</div>’;
h += ‘<div style="font-size:11px;color:#666;margin-bottom:6px">الفائض المتاح: <span style="color:#06D6A0;font-weight:700">’+Math.max(0,sp).toLocaleString()+’ ‘+cur+’</span></div>’;
h += numDisplay(numVal, “#74B9FF”, cur);
h += numpadHTML();
h += ‘<button id="m-save-savings" class="btn-main">حفظ الادخار</button>’;

} else if(modalKind===“addCharge”||modalKind===“addIncome”){
var title = modalKind===“addCharge” ? “إضافة مصروف” : “إضافة مصدر دخل”;
h += ‘<span style="font-size:16px;font-weight:800">’+title+’</span>’;
h += xBtn()+’</div>’;
if(modalStep===“info”){
h += ‘<label class="lbl">الاسم</label><input id="m-label" class="inp" type="text" placeholder="مثل: Diesel، Assurance..." value="'+esc(numLabel)+'"/>’;
h += ‘<label class="lbl">الأيقونة</label><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">’;
ICONS.forEach(function(ic){ h += ‘<button class=“icon-btn” data-ic=”’+ic+’” style=“background:’+(numIcon===ic?”#B8B5FF22”:”#1E2030”)+’;border:2px solid ‘+(numIcon===ic?”#B8B5FF”:“transparent”)+’;border-radius:9px;padding:7px 9px;font-size:19px;cursor:pointer”>’+ic+’</button>’; });
h += ‘</div><label class="lbl">اللون</label><div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px">’;
COLORS.forEach(function(col){ h += ‘<button class=“color-btn” data-col=”’+col+’” style=“width:30px;height:30px;border-radius:99px;background:’+col+’;border:’+(numColor===col?“3px solid #fff”:“3px solid transparent”)+’;cursor:pointer”></button>’; });
h += ‘</div><button id="m-next" class="btn-main">التالي ←</button>’;
} else {
h += ‘<div style="text-align:center;margin-bottom:8px"><span style="font-size:22px">’+numIcon+’</span> <span style="color:#888;font-size:13px">’+esc(numLabel)+’</span></div>’;
h += numDisplay(numVal, “#fff”, cur);
h += numpadHTML();
h += ‘<button id="m-save-item" class="btn-main" style="margin-bottom:8px">تأكيد ✓</button>’;
h += ‘<button id="m-prev" style="width:100%;background:none;border:none;color:#555;font-size:13px;cursor:pointer;padding:8px">← رجوع</button>’;
}

} else if(modalKind===“editItem”){
h += ‘<span style="font-size:16px;font-weight:800">✏️ تعديل</span>’;
h += xBtn()+’</div>’;
h += ‘<label class="lbl">الاسم</label><input id="m-label" class="inp" type="text" value="'+esc(numLabel)+'"/>’;
h += numDisplay(numVal, “#fff”, cur);
h += numpadHTML();
h += ‘<button id="m-save-edit" class="btn-main">حفظ التعديل ✓</button>’;

} else if(modalKind===“import”){
h += ‘<span style="font-size:16px;font-weight:800">📥 استيراد</span>’;
h += xBtn()+’</div>’;
h += ‘<div style="font-size:12px;color:#888;margin-bottom:12px">الصق محتوى ملف JSON هنا:</div>’;
h += ‘<textarea id="m-import-txt" style="width:100%;background:#1E2030;border:1.5px solid #2A2D3E;border-radius:11px;padding:12px;font-size:12px;color:#ccc;height:120px;resize:none;outline:none;margin-bottom:12px" placeholder="الصق JSON هنا..."></textarea>’;
h += ‘<button id="m-do-import" class="btn-main">استيراد البيانات</button>’;
}

return h;
}

function xBtn(){ return ‘<button id="m-close" style="background:#1E2030;border:none;border-radius:99px;width:30px;height:30px;color:#888;cursor:pointer;font-size:16px">✕</button>’; }
function numDisplay(v, color, cur){ return ‘<div style=“font-size:36px;font-weight:900;color:’+(v?color:”#333”)+’;text-align:center;margin-bottom:10px”>’+(v||“0”)+’ <span style="font-size:13px;color:#555">’+cur+’</span></div>’; }
function numpadHTML(){
var h=’<div class="numpad">’;
[“1”,“2”,“3”,“4”,“5”,“6”,“7”,“8”,“9”,”.”,“0”,“⌫”].forEach(function(k){
h += ‘<button class=“nk’+(k===“⌫”?” del”:””)+’” data-nk=”’+k+’”>’+k+’</button>’;
});
return h+’</div>’;
}

/* ════════════════════════════════════════
EVENT WIRING
════════════════════════════════════════ */
function onMainClick(e){
var t = e.target;

var chip = t.closest(”.chip[data-mk]”);
if(chip){ curM=chip.dataset.mk; render(); return; }

if(t.id===“tab-charges”){ curTab=“charges”; render(); return; }
if(t.id===“tab-income”) { curTab=“income”;  render(); return; }
if(t.id===“tab-settings”){ curTab=“settings”; render(); return; }

var ccip = t.closest(”.cur-chip”);
if(ccip){ APP.currency=ccip.dataset.cur; saveData(); render(); return; }

if(t.id===“btn-open-savings”){
numVal=String(peekM(curM).savings||””);
openModal(“savings”); return;
}

if(t.id===“btn-add-charge”){
numVal=””;numLabel=””;numIcon=“📦”;numColor=”#B8B5FF”;modalStep=“info”;
openModal(“addCharge”); return;
}
if(t.id===“btn-add-income”){
numVal=””;numLabel=””;numIcon=“💼”;numColor=”#06D6A0”;modalStep=“info”;
openModal(“addIncome”); return;
}

/* toggle paid */
var tb = t.closest(”.toggle-paid-btn”);
if(tb){
var id=tb.dataset.id;
var md=deepClone(APP.months[curM]||initMonth());
md.charges=md.charges.map(function(c){ return c.id===id ? Object.assign({},c,{paid:!c.paid}) : c; });
APP.months[curM]=md; saveData(); render(); return;
}

/* edit item */
var eb = t.closest(”.edit-btn”);
if(eb){
var id=eb.dataset.id, type=eb.dataset.type;
var src = type===“charge” ? peekM(curM).charges : peekM(curM).incomes;
var item = src.find(function(x){return x.id===id;});
if(!item) return;
editItem=deepClone(item); editType=type;
numVal=String(item.amount); numLabel=item.label; numIcon=item.icon; numColor=item.color;
openModal(“editItem”); return;
}

/* ─── FIX: delete item uses custom confirm ─── */
var db = t.closest(”.del-btn”);
if(db){
var id=db.dataset.id, type=db.dataset.type;
showConfirm(“حذف العنصر”, “هل أنت متأكد من حذف هذا العنصر؟”, function(){
var md=deepClone(APP.months[curM]||initMonth());
if(type===“charge”) md.charges=md.charges.filter(function(x){return x.id!==id;});
else                 md.incomes=md.incomes.filter(function(x){return x.id!==id;});
APP.months[curM]=md; saveData(); toast(“تم الحذف”,“e”); render();
});
return;
}

/* export */
if(t.id===“btn-export”){
var b=new Blob([JSON.stringify(APP,null,2)],{type:“application/json”});
var u=URL.createObjectURL(b), a=document.createElement(“a”), d=new Date();
a.href=u; a.download=“masarifi_”+d.getFullYear()+”-”+(d.getMonth()+1)+”-”+d.getDate()+”.json”;
a.click(); URL.revokeObjectURL(u); toast(“تم التصدير ✓”); return;
}

if(t.id===“btn-import”){ openModal(“import”); return; }

/* ─── FIX: clear all uses custom confirm ─── */
if(t.id===“btn-clear”){
showConfirm(
“🗑️ مسح جميع البيانات”,
“سيتم حذف جميع البيانات نهائياً ولا يمكن التراجع. هل أنت متأكد؟”,
function(){
clearAll();
curTab = “charges”;
curM   = new Date().toISOString().slice(0,7);
toast(“تم مسح جميع البيانات ✓”,“e”);
render();
}
);
return;
}
}

function onModalClick(e){
var t = e.target;

if(t.id===“modal-overlay”){ closeModal(); return; }
if(t.id===“m-close”){ closeModal(); return; }

var nk = t.closest(”.nk”);
if(nk){
var k=nk.dataset.nk;
if(k===“⌫”)                         numVal=numVal.slice(0,-1);
else if(k===”.”&&numVal.includes(”.”)) return;
else if(numVal.length>=9)            return;
else                                 numVal+=k;
redrawModal(); return;
}

var ib = t.closest(”.icon-btn”);
if(ib){ numIcon=ib.dataset.ic; redrawModal(); return; }

var cb = t.closest(”.color-btn”);
if(cb){ numColor=cb.dataset.col; redrawModal(); return; }

if(t.id===“m-next”){
var lbl=document.getElementById(“m-label”); if(lbl) numLabel=lbl.value.trim();
if(!numLabel){ toast(“أدخل الاسم أولاً”,“e”); return; }
modalStep=“amount”; numVal=””; redrawModal(); return;
}

if(t.id===“m-prev”){ modalStep=“info”; redrawModal(); return; }

if(t.id===“m-save-savings”){
var v=parseFloat(numVal)||0;
var md=deepClone(APP.months[curM]||initMonth());
var sp=md.incomes.reduce(function(s,x){return s+x.amount;},0)-md.charges.reduce(function(s,x){return s+x.amount;},0);
if(v>sp&&sp>0) toast(“يتجاوز الفائض المتاح!”,“w”);
md.savings=v; APP.months[curM]=md; saveData();
closeModal(); toast(“تم حفظ الادخار ✓”); render(); return;
}

if(t.id===“m-save-item”){
var lbl=document.getElementById(“m-label”); if(lbl) numLabel=lbl.value.trim();
var v=parseFloat(numVal);
if(!numLabel){ toast(“أدخل الاسم”,“e”); return; }
if(isNaN(v)||v<=0){ toast(“أدخل مبلغاً صحيحاً”,“e”); return; }
var ni={id:uid(), label:numLabel, amount:v, icon:numIcon, color:numColor, paid:false};
var md=deepClone(APP.months[curM]||initMonth());
if(modalKind===“addCharge”) md.charges.push(ni);
else                        md.incomes.push(ni);
APP.months[curM]=md; saveData();
closeModal(); toast(“تمت الإضافة ✓”); render(); return;
}

if(t.id===“m-save-edit”){
var lbl=document.getElementById(“m-label”); if(lbl) numLabel=lbl.value.trim();
var v=parseFloat(numVal);
if(isNaN(v)||v<=0){ toast(“أدخل مبلغاً صحيحاً”,“e”); return; }
var md=deepClone(APP.months[curM]||initMonth());
var arr=editType===“charge”?md.charges:md.incomes;
var upd=arr.map(function(x){
return x.id===editItem.id ? Object.assign({},x,{label:numLabel||x.label,amount:v,icon:numIcon,color:numColor}) : x;
});
if(editType===“charge”) md.charges=upd; else md.incomes=upd;
APP.months[curM]=md; saveData();
closeModal(); toast(“تم الحفظ ✓”); render(); return;
}

if(t.id===“m-do-import”){
var txt=document.getElementById(“m-import-txt”);
if(!txt||!txt.value.trim()){ toast(“الصق البيانات أولاً”,“e”); return; }
try{
var imp=JSON.parse(txt.value.trim());
if(!imp.months){ toast(“ملف غير صالح”,“e”); return; }
APP=imp; saveData(); closeModal(); toast(“تم الاستيراد ✓”); render();
}catch(e){ toast(“خطأ في الملف”,“e”); }
return;
}
}

/* ════════════════════════════════════════
ATTACH LISTENERS  (once)
════════════════════════════════════════ */
document.getElementById(“main”).addEventListener(“click”, onMainClick);
document.getElementById(“modal-overlay”).addEventListener(“click”, onModalClick);

/* ════════════════════════════════════════
START
════════════════════════════════════════ */
render();
</script>

</body>
</html>
